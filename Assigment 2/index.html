<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Weather Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body class="dark-theme">
    <header>
        <h1>☀️ Async Weather Tracker</h1>
    </header>

    <main class="dashboard-grid">
        <section class="card">
            <h3>Search City</h3>
            <form id="weather_Form">
                <div class="search-group">
                    <input type="text" id="city" placeholder="Enter city (e.g. Indore)" required>
                    <input type="submit" id="search" value="Search">
                </div>
            </form>
            
            <h3 class="history-title">Search History</h3>
            <div class="searchHistory"></div>
        </section>

        <section class="card">
            <h3>Weather Info</h3>
            <div class="info-grid" id="weather-result">
                <span>City</span> <span class="val">--</span>
                <span>Temp</span> <span class="val">--</span>
                <span>Weather</span> <span class="val">--</span>
                <span>Humidity</span> <span class="val">--</span>
                <span>Wind</span> <span class="val">--</span>
            </div>
        </section>

        <section class="card console-card">
            <h3>Console – Event Loop</h3>
            <div class="event_state" id="console-box"></div>
        </section>
    </main>
</body>
</html>
